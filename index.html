<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <title>Quiz Test tuzuvchi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      .theme-toggle {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 50;
        border: 1px solid rgba(15, 23, 42, 0.16);
        border-radius: 8px;
        background: #0f172a;
        color: #ffffff;
        padding: 11px 14px;
        font: 700 14px/1 Inter, system-ui, sans-serif;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.22);
        cursor: pointer;
      }

      .theme-dark .theme-toggle {
        border-color: rgba(148, 163, 184, 0.35);
        background: #f8fafc;
        color: #0f172a;
      }

      .theme-dark body {
        background: #020617;
      }

      .theme-dark #root > div {
        background: radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 34%),
          linear-gradient(135deg, #020617 0%, #111827 48%, #1e1b4b 100%) !important;
        color: #e5e7eb;
      }

      .theme-dark [class*="bg-white"],
      .theme-dark [class*="bg-slate-50"] {
        background-color: rgba(15, 23, 42, 0.9) !important;
      }

      .theme-dark [class*="text-slate-950"],
      .theme-dark [class*="text-slate-900"],
      .theme-dark [class*="text-slate-800"] {
        color: #f8fafc !important;
      }

      .theme-dark [class*="text-slate-700"],
      .theme-dark [class*="text-slate-600"],
      .theme-dark [class*="text-slate-500"] {
        color: #cbd5e1 !important;
      }

      .theme-dark [class*="border-slate-200"],
      .theme-dark [class*="border-slate-300"] {
        border-color: rgba(148, 163, 184, 0.28) !important;
      }

      .theme-dark [class*="shadow"] {
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.38) !important;
      }

      .theme-dark [class*="bg-emerald-50"] {
        background-color: rgba(6, 78, 59, 0.42) !important;
      }

      .theme-dark [class*="bg-rose-50"] {
        background-color: rgba(127, 29, 29, 0.42) !important;
      }

      .theme-dark [class*="bg-amber-50"] {
        background-color: rgba(120, 53, 15, 0.42) !important;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BF8UsTuI.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Dtpfxr_V.css">
  </head>
  <body>
    <div id="root"></div>
    <button class="theme-toggle" type="button" aria-label="Tungi rejimga o'tish">Tun</button>
    <script>
      (function () {
        var root = document.documentElement;
        var button = document.querySelector('.theme-toggle');
        var savedTheme = localStorage.getItem('quiz-theme');

        function setTheme(theme) {
          var isDark = theme === 'dark';
          root.classList.toggle('theme-dark', isDark);
          button.textContent = isDark ? 'Kun' : 'Tun';
          button.setAttribute('aria-label', isDark ? "Kunduzgi rejimga o'tish" : "Tungi rejimga o'tish");
          localStorage.setItem('quiz-theme', theme);
        }

        setTheme(savedTheme || 'light');
        button.addEventListener('click', function () {
          setTheme(root.classList.contains('theme-dark') ? 'light' : 'dark');
        });
      })();
    </script>
  </body>
</html>
